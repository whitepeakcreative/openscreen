name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Windows
          path: release/**/Openscreen Setup *.exe

  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSCREEN_MAC_HELPER_ARCHS: ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Mac-${{ matrix.arch }}
          path: release/**/*${{ matrix.arch }}*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer1.0-plugins-base-dev \
            cmake ninja-build pkg-config
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Linux
          path: |
            release/**/*.AppImage
            release/**/*.deb

  release:
    runs-on: ubuntu-latest
    needs: [build-win, build-mac, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Openscreen-Windows/**
            artifacts/Openscreen-Mac-*/**
            artifacts/Openscreen-Linux/**
