name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Windows
          path: release/**/Openscreen Setup *.exe

  build-mac:
    runs-on: macos-latest
    needs: build-win
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Mac
          path: release/**/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    needs: build-mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-caption-model.mjs
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 0
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Openscreen-Linux
          path: |
            release/**/*.AppImage
            release/**/*.deb
